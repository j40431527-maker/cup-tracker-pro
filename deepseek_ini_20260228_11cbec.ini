# scripts/cup-tracker.service
[Unit]
Description=Cup Tracker Pro Service
After=graphical-session.target
Wants=graphical-session.target

[Service]
Type=simple
ExecStart=%h/.local/bin/cup-tracker --service
ExecReload=/bin/kill -HUP $MAINPID
Restart=on-failure
RestartSec=5
Environment="DISPLAY=:0"
Environment="XDG_RUNTIME_DIR=/run/user/%I"
Environment="CUDA_VISIBLE_DEVICES=0"
Environment="OMP_NUM_THREADS=8"
Environment="MKL_NUM_THREADS=8"
Nice=-10
IOSchedulingClass=realtime
IOSchedulingPriority=0

# Security
PrivateTmp=yes
NoNewPrivileges=yes
ProtectSystem=strict
ProtectHome=read-only
ReadWritePaths=%h/.local/share/cup-tracker
ReadWritePaths=%h/.config/cup-tracker

[Install]
WantedBy=default.target